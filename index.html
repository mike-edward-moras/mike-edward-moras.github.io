<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mike Edward Moras — Certificates</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
body{margin:0;padding:24px;font:14px Arial,sans-serif;background:#f4f6f8;color:#111}h1{margin:0 0 16px}input{width:100%;padding:12px 14px;margin-bottom:16px;border:1px solid #ccc;border-radius:10px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}th,td{padding:14px 16px;border-bottom:1px solid #eee;text-align:left}th{background:#111827;color:#fff;cursor:pointer;user-select:none}tr:hover{background:#f9fafb}a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1100px;margin:auto}.empty{text-align:center;color:#777}
</style>
</head>
<body>
<div class="wrap">
<h1>Mike Edward Moras</h1><h2 style="margin:0 0 16px;font-weight:400;color:#555">Certificates</h2>
<input id="s" placeholder="Search issuer or certificate name...">
<table>
<thead><tr><th data-k="Authority">Issuer</th><th data-k="Name">Certificate Name</th></tr></thead>
<tbody id="b"><tr><td colspan="2" class="empty">Loading...</td></tr></tbody>
</table>
</div>
<script>
const P={'University of Pennsylvania':120,'University of Maryland':119,'The Open University':118,Google:100,Microsoft:99,'Amazon Web Services (AWS)':98,AWS:98,Cisco:96,IBM:95,'EC-Council':94,Coursera:88,'TCM Security':86,Cybrary:85,'atingi.org':40},S=document.getElementById('s'),B=document.getElementById('b');
let D=[],K='Authority',O='desc',I=1;
const C=(a,b,o='asc')=>(a=(a||'').toLowerCase(),b=(b||'').toLowerCase(),a<b?o==='asc'?-1:1:a>b?o==='asc'?1:-1:0);
const N=c=>{let i=(c.Authority||'').replace(' - Free online courses with Certificate','').trim(),n=(c.Name||'').replace(new RegExp('^'+i.replace(/[.*+?^${}()|[\]\]/g,'\$&')+'\s*[—-]\s*'),'').trim(),l=c['License Number']||'',u=c.Url||'';return u?`<a href="${u}" target="_blank" rel="noopener">${n}</a>`:l?`<a href="#" onclick="alert('${l.replace(/'/g,"\'")}');return false">${n}</a>`:n};
function R(){let q=S.value.toLowerCase().trim(),F=D.filter(c=>(c.Url||c['License Number'])&&((c.Authority||'').toLowerCase().includes(q)||(c.Name||'').toLowerCase().includes(q)));
F.sort((a,b)=>{if(I){let pa=P[a.Authority]||50,pb=P[b.Authority]||50;if(pa!==pb)return pb-pa}let r=C(a[K],b[K],O);return r||C(a[K==='Authority'?'Name':'Authority'],b[K==='Authority'?'Name':'Authority'],K==='Authority'?'asc':'desc')});
I=0;
B.innerHTML=F.length?F.map(c=>`<tr><td>${(c.Authority||'').replace(' - Free online courses with Certificate','')}</td><td>${N(c)}</td></tr>`).join(''):'<tr><td colspan="2" class="empty">No certificates found.</td></tr>'}
Papa.parse('Certifications.csv',{download:1,header:1,skipEmptyLines:1,complete:r=>(D=r.data,R()),error:e=>B.innerHTML=`<tr><td colspan="2" class="empty">${e.message}</td></tr>`});
S.oninput=R;
document.querySelectorAll('th').forEach(t=>t.onclick=()=>{K=t.dataset.k,O=O==='asc'?'desc':'asc',I=0,R()});
</script>
</body>
</html>
