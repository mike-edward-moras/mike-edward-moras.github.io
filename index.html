<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mike Edward Moras — Certificates</title>  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      background:#f3f4f6;
      color:#111827;
      font-family:Arial,sans-serif;
    }
    .container{
      max-width:1100px;
      margin:auto;
    }
    h1{
      margin:0;
      font-size:48px;
      font-weight:700;
    }
    h2{
      margin:0 0 20px;
      font-size:20px;
      font-weight:400;
      color:#6b7280;
    }
    #search{
      width:100%;
      padding:14px 16px;
      margin-bottom:20px;
      border:1px solid #d1d5db;
      border-radius:14px;
      background:#fff;
      font-size:16px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:18px;
      background:#fff;
      box-shadow:0 2px 12px rgba(0,0,0,.08);
    }
    th,td{
      padding:16px;
      text-align:left;
      border-bottom:1px solid #e5e7eb;
    }
    th{
      background:#0f172a;
      color:#fff;
      cursor:pointer;
      user-select:none;
    }
    tr:hover{
      background:#f9fafb;
    }
    a{
      color:#2563eb;
      text-decoration:none;
    }
    a:hover{
      text-decoration:underline;
    }
    .message{
      text-align:center;
      color:#6b7280;
    }
  </style></head>
<body>
  <div class="container">
    <h1>Mike Edward Moras</h1>
    <h2>Certificates</h2><input id="search" type="text" placeholder="Search issuer or certificate name...">

<table>
  <thead>
    <tr>
      <th data-field="issuer">Issuer</th>
      <th data-field="name">Certificate Name</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr>
      <td colspan="2" class="message">Loading certificates...</td>
    </tr>
  </tbody>
</table>

  </div>  <script>
    const tableBody=document.getElementById('tableBody');
    const searchInput=document.getElementById('search');
    const headers=document.querySelectorAll('th[data-field]');

    const issuerPriority={
      Google:100,
      Microsoft:99,
      'Amazon Web Services (AWS)':98,
      AWS:98,
      Cisco:96,
      IBM:95,
      'EC-Council':94,
      Coursera:88,
      'TCM Security':86,
      Cybrary:85,
      'atingi.org':40
    };

    let certificates=[];
    let sortField='issuer';
    let sortDirection='desc';
    let firstLoad=true;

    function normalizeIssuer(issuer=''){
      return issuer
        .replace(' - Free online courses with Certificate','')
        .trim();
    }

    function escapeRegex(text=''){
      return text.replace(/[.*+?^${}()|[\]\]/g,'\$&');
    }

    function normalizeCertificateName(name='',issuer=''){
      if(!issuer)return name;

      const regex=new RegExp(`^${escapeRegex(issuer)}\s*[—-]\s*`,'i');
      return name.replace(regex,'').trim();
    }

    function compare(a,b,direction='asc'){
      const x=(a||'').toString().toLowerCase();
      const y=(b||'').toString().toLowerCase();

      if(x<y)return direction==='asc'?-1:1;
      if(x>y)return direction==='asc'?1:-1;
      return 0;
    }

    function buildCertificateLink(cert){
      const issuer=normalizeIssuer(cert.Authority||'');
      const name=normalizeCertificateName(cert.Name||'',issuer);
      const license=cert['License Number']||'';
      const url=cert.Url||'';

      if(url){
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a>`;
      }

      if(license){
        const safeLicense=license.replace(/'/g,"\'");
        return `<a href="#" onclick="alert('${safeLicense}');return false;">${name}</a>`;
      }

      return name;
    }

    function filterCertificates(){
      const query=searchInput.value.trim().toLowerCase();

      return certificates.filter(cert=>{
        const hasVerification=Boolean(cert.Url||cert['License Number']);

        if(!hasVerification)return false;

        return (
          (cert.Authority||'').toLowerCase().includes(query)||
          (cert.Name||'').toLowerCase().includes(query)
        );
      });
    }

    function sortCertificates(items){
      items.sort((a,b)=>{
        if(firstLoad){
          const priorityA=issuerPriority[normalizeIssuer(a.Authority)]||50;
          const priorityB=issuerPriority[normalizeIssuer(b.Authority)]||50;

          if(priorityA!==priorityB){
            return priorityB-priorityA;
          }
        }

        const valueA=sortField==='issuer'
          ? normalizeIssuer(a.Authority)
          : normalizeCertificateName(a.Name,normalizeIssuer(a.Authority));

        const valueB=sortField==='issuer'
          ? normalizeIssuer(b.Authority)
          : normalizeCertificateName(b.Name,normalizeIssuer(b.Authority));

        const primary=compare(valueA,valueB,sortDirection);

        if(primary!==0)return primary;

        return compare(a.Name,b.Name,'asc');
      });

      firstLoad=false;
    }

    function render(){
      const rows=filterCertificates();

      sortCertificates(rows);

      if(!rows.length){
        tableBody.innerHTML=`
          <tr>
            <td colspan="2" class="message">No certificates found.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML=rows.map(cert=>{
        const issuer=normalizeIssuer(cert.Authority||'');

        return `
          <tr>
            <td>${issuer}</td>
            <td>${buildCertificateLink(cert)}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadCertificates(){
      try{
        const response=await fetch('Certifications.csv?cache='+Date.now());

        if(!response.ok){
          throw new Error(`HTTP ${response.status}`);
        }

        const csvText=await response.text();

        Papa.parse(csvText,{
          header:true,
          skipEmptyLines:true,
          complete:(results)=>{
            certificates=results.data||[];
            render();
          },
          error:(error)=>{
            tableBody.innerHTML=`
              <tr>
                <td colspan="2" class="message">CSV parsing failed: ${error.message}</td>
              </tr>
            `;
          }
        });
      }catch(error){
        tableBody.innerHTML=`
          <tr>
            <td colspan="2" class="message">Failed to load Certifications.csv (${error.message})</td>
          </tr>
        `;
      }
    }

    searchInput.addEventListener('input',render);

    headers.forEach(header=>{
      header.addEventListener('click',()=>{
        const field=header.dataset.field;

        if(sortField===field){
          sortDirection=sortDirection==='asc'?'desc':'asc';
        }else{
          sortField=field;
          sortDirection=field==='issuer'?'desc':'asc';
        }

        render();
      });
    });

    loadCertificates();
  </script></body>
</html>
