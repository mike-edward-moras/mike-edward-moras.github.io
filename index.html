<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certifications Viewer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .controls {
      margin-bottom: 15px;
    }

    select {
      padding: 8px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f0f0f0;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<h1>Certifications</h1>

<div class="controls">
  <label for="sortSelect">Sort by:</label>
  <select id="sortSelect">
    <option value="issuer">Issuer Name</option>
    <option value="certificate">Certificate Name</option>
  </select>
</div>

<table id="certTable">
  <thead>
    <tr>
      <th>Issuer Name</th>
      <th>Certificate Name</th>
      <th>Verification</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadCSV() {
  const response = await fetch('Certificates.csv');
  const csvText = await response.text();

  const rows = parseCSV(csvText);

  renderTable(rows);

  document.getElementById('sortSelect').addEventListener('change', (e) => {
    const sorted = [...rows];

    if (e.target.value === 'issuer') {
      sorted.sort((a, b) =>
        a["Issuer name"].localeCompare(b["Issuer name"])
      );
    } else {
      sorted.sort((a, b) =>
        a["Certificate name"].localeCompare(b["Certificate name"])
      );
    }

    renderTable(sorted);
  });
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);

  return lines.slice(1).map(line => {
    const values = parseCSVLine(line);
    const obj = {};

    headers.forEach((header, index) => {
      obj[header] = values[index] || '';
    });

    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      if (insideQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        insideQuotes = !insideQuotes;
      }
    } else if (char === ',' && !insideQuotes) {
      result.push(current);
      current = '';
    } else {
      current += char;
    }
  }

  result.push(current);

  return result;
}

function renderTable(rows) {
  const tbody = document.querySelector('#certTable tbody');
  tbody.innerHTML = '';

  rows.forEach(row => {
    const tr = document.createElement('tr');

    const issuerTd = document.createElement('td');
    issuerTd.textContent = row["Issuer name"] || '';

    const certTd = document.createElement('td');
    certTd.textContent = row["Certificate name"] || '';

    const verificationTd = document.createElement('td');

    const verification = row["Verification"] || '';
    const verificationUrl = row["Verification URL"] || '';

    if (verification && verificationUrl) {
      const link = document.createElement('a');
      link.href = verificationUrl;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = verification;

      verificationTd.appendChild(link);
    } else if (verification) {
      verificationTd.textContent = verification;
    }

    tr.appendChild(issuerTd);
    tr.appendChild(certTd);
    tr.appendChild(verificationTd);

    tbody.appendChild(tr);
  });
}

loadCSV();
</script>

</body>
</html>
