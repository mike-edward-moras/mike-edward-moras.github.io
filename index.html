<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mike Edward Moras : Certificates</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #181818;
      --surface2:  #202020;
      --border:    #2a2a2a;
      --border2:   #333;
      --text:      #e8e4dc;
      --muted:     #706b60;
      --accent:    #c9a96e;
      --accent-dim:#7a5f32;
      --link:      #c9a96e;
      --link-hover:#e0c08a;
      --mark-bg:   rgba(201,169,110,0.22);
      --mark-text: #e0c08a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 56px 40px 80px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    h1 {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header-rule {
      margin-top: 20px;
      height: 1px;
      background: linear-gradient(to right, var(--accent-dim), transparent);
    }
    .linkedin-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }

    .linkedin-link:hover {
      background: var(--accent);
      color: var(--bg);
    }
    /* ── Search ── */
    .search-bar {
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s ease forwards;
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 0 16px;
      transition: border-color 0.2s;
    }

    .search-inner:focus-within {
      border-color: var(--accent-dim);
    }

    .search-icon {
      color: var(--muted);
      flex-shrink: 0;
    }

    #searchInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      padding: 14px 0;
      caret-color: var(--accent);
    }

    #searchInput::placeholder { color: var(--muted); }

    .result-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Cards ── */
    #cardList {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    .cert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 24px;
      row-gap: 6px;
      align-items: center;
      transition: background 0.15s, border-color 0.15s;
      animation: fadeIn 0.3s ease both;
    }

    .cert-card:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }

    .cert-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      grid-column: 1;
      grid-row: 1;
    }

    .cert-issuer {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      grid-column: 1;
      grid-row: 2;
    }

    .cert-verify {
      grid-column: 2;
      grid-row: 1 / 3;
      align-self: center;
      justify-self: end;
    }

    .verify-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent-dim);
      padding: 5px 12px;
      display: inline-block;
      max-width: calc(8ch + 24px); /* 8ch text + padding */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
      transition: background 0.15s, color 0.15s;
    }

    .verify-link:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .verify-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: inline-block;
      max-width: 8ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* highlight */
    mark {
      background: var(--mark-bg);
      color: var(--mark-text);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Empty / loading states ── */
    .state-msg {
      padding: 60px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .state-msg span {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      color: var(--border2);
      margin-bottom: 12px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="eyebrow">Mike Edward Moras</h1>
    <h2>Certificates</h2>
    <p><a class="linkedin-link" href="https://mike-edward-moras.github.io/">mike-edward-moras.github.io</a></p>
    <div class="header-rule"></div>
    <p><a class="linkedin-link" href="https://linkedin.com/in/mike-edward-moras" target="_blank">linkedin.com/in/mike-edward-moras</a></p>
  </header>
                   
  <div class="search-bar">
    <div class="search-inner">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by issuer or certificate…" autocomplete="off" spellcheck="false">
      <span class="result-count" id="resultCount"></span>
    </div>
  </div>

  <div id="cardList">
    <div class="state-msg"><span>·</span>Loading…</div>
  </div>

<script>
  let allRows = [];

  /* ── Fetch ── */
  async function loadCSV() {
    const res = await fetch('Certificates.csv?v=' + Date.now());
    const text = await res.text();
    allRows = parseCSV(text);

    /* ── Issuer weights ──────────────────────────────────────────────
       Scale 0–100. Higher = more employer-recognised.
       Unknown / unlisted issuers fall back to 0 (neutral / lowest).
    ──────────────────────────────────────────────────────────────── */
    const ISSUER_WEIGHTS = {
      // ── Tier 1 · Global tech & finance giants (85–95) ──
      'Google':                            95,
      'Microsoft':                         95,
      'Goldman Sachs':                     92,
      'IBM':                               88,
      'Cisco':                             88,
      'University of Pennsylvania':        85,

      // ── Tier 2 · Major companies & prestigious institutions (75–84) ──
      'Deloitte':                          82,
      'Bloomberg':                         82,
      'Mastercard':                        82,
      'Accenture':                         80,
      'Clifford Chance':                   80,
      'Citi':                              80,
      'Herbert Smith Freehills':           78,
      'DLA Piper':                         76,
      'Lloyds Banking Group':              75,
      'Standard Chartered':               75,

      // ── Tier 3 · Well-known companies, universities, govt (60–74) ──
      'AIG':                               72,
      'Anthropic':                         72,
      'FEMA':                              72,
      'University of Maryland':            70,
      'Tata Group':                        70,
      'PNC':                               70,
      'The State University of New York':  65,
      'EC-Council':                        65,
      'UKAS':                              62,
      'Dataiku':                           60,
      'Leo Cussen Centre for Law':         60,
      'Santander Open Academy':            60,

      // ── Tier 4 · Online platforms with brand recognition (40–59) ──
      'LinkedIn':                          58,
      'Coursera':                          55,
      'Datacom':                           52,
      'The LEGO Foundation':              52,
      'Cognitive Class':                   50,
      'HP LIFE':                           50,
      'Cybrary':                           48,
      'FutureLearn':                       45,
      'International Six Sigma Institute™': 45,
      'Saylor University':                 42,
      'atingi.org':                        42,

      // ── Tier 5 · Lesser-known / self-cert platforms (20–39) ──
      'SkillFront':                        35,
      'Cursa':                             28,
      'CourseStack, Inc':                  20,
    };

    function issuerWeight(issuerName) {
      return ISSUER_WEIGHTS[issuerName] ?? 0;
    }

    /* Sort: issuer weight DESC, then issuer name ASC, then certificate name ASC */
    allRows.sort((a, b) => {
      const wA = issuerWeight(a['Issuer name']);
      const wB = issuerWeight(b['Issuer name']);
      if (wB !== wA) return wB - wA;
      const iCmp = (a['Issuer name'] || '').localeCompare(b['Issuer name'] || '');
      if (iCmp !== 0) return iCmp;
      return (a['Certificate name'] || '').localeCompare(b['Certificate name'] || '');
    });

    render('');
  }

  /* ── CSV parsing ── */
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const values = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = values[i] || '');
      return obj;
    });
  }

  function parseCSVLine(line) {
    const result = [];
    let current = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (c === ',' && !inQuotes) {
        result.push(current); current = '';
      } else {
        current += c;
      }
    }
    result.push(current);
    return result;
  }

  /* ── Search ── */
  document.getElementById('searchInput').addEventListener('input', function () {
    render(this.value.trim());
  });

  /* ── Render ── */
  function render(query) {
    const q = query.toLowerCase();

    const rows = q
      ? allRows.filter(r =>
          (r['Issuer name'] || '').toLowerCase().includes(q) ||
          (r['Certificate name'] || '').toLowerCase().includes(q)
        )
      : allRows;

    const countEl = document.getElementById('resultCount');
    countEl.textContent = q
      ? `${rows.length} / ${allRows.length}`
      : `${allRows.length} total`;

    const list = document.getElementById('cardList');

    if (rows.length === 0) {
      list.innerHTML = `<div class="state-msg"><span>∅</span>No certificates match "${esc(query)}"</div>`;
      return;
    }

    list.innerHTML = rows.map((r, i) => {
      const name         = r['Certificate name'] || '';
      const issuer       = r['Issuer name'] || '';
      const verification = r['Verification'] || '';
      const url          = r['Verification URL'] || '';

      let verHtml = '';
      if (verification && url) {
        verHtml = `<a class="verify-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer" title="${esc(verification)}">${hl(verification, q)}</a>`;
      } else if (verification) {
        verHtml = `<span class="verify-text" title="${esc(verification)}">${hl(verification, q)}</span>`;
      }

      return `<div class="cert-card" style="animation-delay:${i * 18}ms">
        <div class="cert-name">${hl(name, q)}</div>
        <div class="cert-issuer">${hl(issuer, q)}</div>
        <div class="cert-verify">${verHtml}</div>
      </div>`;
    }).join('');
  }

  /* ── Helpers ── */
  function hl(text, query) {
    if (!query) return esc(text);
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return esc(text).replace(re, '<mark>$1</mark>');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  loadCSV();
</script>
</body>
</html>
