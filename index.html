<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certification Viewer</title>  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .search:focus {
      border-color: #2563eb;
    }

    .table-wrapper {
      overflow-x: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #111827;
      color: white;
    }

    th,
    td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .status {
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .empty {
      text-align: center;
      color: #6b7280;
    }
  </style></head>
<body>
  <div class="container">
    <h1>Certification Viewer</h1><div class="toolbar">
  <input
    type="text"
    id="searchInput"
    class="search"
    placeholder="Search issuer or certificate name..."
  />
</div>

<div id="status" class="status">Loading certifications...</div>

<div id="tableWrapper" class="table-wrapper" style="display:none;">
  <table>
    <thead>
      <tr>
        <th data-sort="Authority">Issuer</th>
        <th data-sort="Name">Certificate Name</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

  </div>  <script>
    const CSV_FILE = 'Certifications.csv';

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const tableWrapper = document.getElementById('tableWrapper');
    const status = document.getElementById('status');
    const headers = document.querySelectorAll('th[data-sort]');

    let certifications = [];

    let currentSort = {
      field: 'Authority',
      direction: 'desc'
    };

    function compareValues(a, b, direction = 'asc') {
      const valueA = (a || '').toString().toLowerCase();
      const valueB = (b || '').toString().toLowerCase();

      if (valueA < valueB) return direction === 'asc' ? -1 : 1;
      if (valueA > valueB) return direction === 'asc' ? 1 : -1;
      return 0;
    }

    function getCertificateName(cert) {
      const name = cert.Name || 'Untitled';
      const license = cert['License Number'] || '';
      const url = cert.Url || '';

      if (url) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a>`;
      }

      if (license) {
        const escapedLicense = license.replace(/'/g, "\'");

        return `
          <a
            href="#"
            onclick="alert('${escapedLicense}'); return false;"
          >
            ${name}
          </a>
        `;
      }

      return name;
    }

    function renderTable(data) {
      if (!data.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="2" class="empty">No certificates found.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = data.map(cert => `
        <tr>
          <td>${cert.Authority || ''}</td>
          <td>${getCertificateName(cert)}</td>
        </tr>
      `).join('');
    }

    function applyFiltersAndSort() {
      const search = searchInput.value.trim().toLowerCase();

      let filtered = certifications.filter(cert => {
        return (
          (cert.Authority || '').toLowerCase().includes(search) ||
          (cert.Name || '').toLowerCase().includes(search)
        );
      });

      filtered.sort((a, b) => {
        const primary = compareValues(
          a[currentSort.field],
          b[currentSort.field],
          currentSort.direction
        );

        if (primary !== 0) {
          return primary;
        }

        if (currentSort.field === 'Authority') {
          return compareValues(a.Name, b.Name, 'asc');
        }

        return compareValues(a.Authority, b.Authority, 'desc');
      });

      renderTable(filtered);
    }

    headers.forEach(header => {
      header.addEventListener('click', () => {
        const field = header.dataset.sort;

        if (currentSort.field === field) {
          currentSort.direction = currentSort.direction === 'asc'
            ? 'desc'
            : 'asc';
        } else {
          currentSort.field = field;
          currentSort.direction = field === 'Authority' ? 'desc' : 'asc';
        }

        applyFiltersAndSort();
      });
    });

    searchInput.addEventListener('input', applyFiltersAndSort);

    Papa.parse(CSV_FILE, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: ({ data }) => {
        certifications = data;

        status.style.display = 'none';
        tableWrapper.style.display = 'block';

        applyFiltersAndSort();
      },
      error: error => {
        status.textContent = `Failed to load CSV file: ${error.message}`;
      }
    });
  </script></body>
</html>
